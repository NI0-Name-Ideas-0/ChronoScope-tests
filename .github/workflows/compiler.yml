name: Compile LaTeX

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compile tests.tex
        uses: xu-cheng/latex-action@v4
        with:
          root_file: tests.tex

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: pdf
          path: tests.pdf
